<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Forest Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Fredoka', sans-serif; background: #0f0c29; }
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; }
        .ui-layer { position: relative; z-index: 10; pointer-events: none; color: white; padding: 20px; display: flex; justify-content: space-between; }
        .question-box { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        .math-q { font-size: 5rem; text-shadow: 0 0 20px #00d2ff; margin: 0; }
        .eng-q { font-size: 1.5rem; color: #00d2ff; opacity: 0.8; }
        .bubble { 
            position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.2); 
            border: 3px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; 
            justify-content: center; align-items: center; font-size: 2.5rem; color: white; 
            cursor: pointer; pointer-events: auto; backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0,210,255,0.4); transition: transform 0.1s;
        }
        .bubble:active { transform: scale(0.9); }
        #start-btn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 50px; font-size: 2rem; background: #00d2ff; border: none; 
            border-radius: 50px; color: white; cursor: pointer; z-index: 100;
            box-shadow: 0 0 30px #00d2ff;
        }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>
<button id="start-btn" onclick="init()">START MISSION 🚀</button>

<div class="ui-layer">
    <div id="score">XP: 0</div>
    <div id="lives">❤️❤️❤️</div>
</div>

<div class="question-box">
    <div class="eng-q" id="eng-q">Ready?</div>
    <div class="math-q" id="math-q">? x ?</div>
</div>

<script>
    let score = 0;
    let n1, n2, correct;
    const colors = ['#00d2ff', '#92fe9d', '#ff7675', '#fdcb6e'];
    const engNums = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten", "eleven", "twelve"];

    function init() {
        document.getElementById('start-btn').style.display = 'none';
        nextQuestion();
        animate();
    }

    function nextQuestion() {
        n1 = Math.floor(Math.random() * 9) + 2;
        n2 = Math.floor(Math.random() * 10) + 1;
        correct = n1 * n2;
        
        document.getElementById('math-q').innerText = `${n1} x ${n2}`;
        document.getElementById('eng-q').innerText = `${engNums[n1]} times ${engNums[n2]}`;
        
        // Voz en Inglés
        const talk = new SpeechSynthesisUtterance(`${engNums[n1]} times ${engNums[n2]}`);
        talk.lang = 'en-US';
        window.speechSynthesis.speak(talk);

        createBubbles();
    }

    function createBubbles() {
        const existing = document.querySelectorAll('.bubble');
        existing.forEach(b => b.remove());

        let options = [correct];
        while(options.length < 4) {
            let fake = (Math.floor(Math.random()*10)+1) * (Math.floor(Math.random()*10)+1);
            if(!options.includes(fake)) options.push(fake);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach((opt, i) => {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerText = opt;
            b.style.left = (20 + (i * 20)) + '%';
            b.style.top = '100%';
            
            // Animación de subida
            let pos = 100;
            let speed = 0.5 + (Math.random() * 0.5);
            let drift = Math.sin(i) * 2;

            function move() {
                if (pos < -20) { pos = 110; } // Reaparece abajo
                pos -= speed;
                b.style.top = pos + '%';
                b.style.transform = `translateX(${Math.sin(pos/10) * 20}px)`;
                if (b.parentNode) requestAnimationFrame(move);
            }
            
            b.onclick = () => {
                if(opt === correct) {
                    score += 10;
                    document.getElementById('score').innerText = `XP: ${score}`;
                    b.style.background = "#00ffcc";
                    setTimeout(nextQuestion, 500);
                } else {
                    b.style.background = "#ff2a2a";
                    setTimeout(() => b.style.background = "rgba(255,255,255,0.2)", 500);
                }
            };

            document.body.appendChild(b);
            move();
        });
    }

    // Fondo de estrellas animado
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function animate() {
        ctx.fillStyle = 'rgba(15, 12, 41, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for(let i=0; i<5; i++) {
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*2, 0, Math.PI*2);
            ctx.fill();
        }
        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
