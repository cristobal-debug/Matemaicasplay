<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión Estelar: Familia & Saber</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a29bfe;
            --secondary: #55efc4;
            --danger: #ff7675;
            --dark: #2d3436;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Fredoka', sans-serif;
            background: #0f0c29; color: white; overflow: hidden;
        }

        /* HUD Superior */
        .hud {
            position: absolute; top: 0; width: 100%; display: flex;
            justify-content: space-between; padding: 20px; box-sizing: border-box;
            font-size: 1.2rem; z-index: 100; pointer-events: none;
            background: rgba(0,0,0,0.3);
        }

        .lives { color: var(--danger); font-size: 1.5rem; letter-spacing: 5px; }

        /* Contenedor de Juego */
        .game-screen {
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .question-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 30px; border-radius: 20px;
            border: 2px solid var(--primary);
            text-align: center; margin-bottom: 20px;
            max-width: 80%;
        }

        #main-q { font-size: 3rem; margin: 10px 0; }
        #sub-q { font-size: 1.2rem; color: var(--secondary); margin-bottom: 10px; }

        /* Burbujas */
        .bubble {
            position: absolute; width: 85px; height: 85px;
            background: radial-gradient(circle at 30% 30%, #ffffff, var(--primary));
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 1.8rem; color: var(--dark);
            font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 50;
        }

        /* Opciones de respuesta (Para Biblia e Inglés) */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            width: 90%; max-width: 400px;
        }

        .opt-btn {
            background: white; color: var(--dark); border: none;
            padding: 15px; border-radius: 15px; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }

        .opt-btn:active { transform: scale(0.95); }

        /* Modales */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 500; text-align: center; padding: 20px;
        }

        .modal-content {
            background: white; color: var(--dark); padding: 30px;
            border-radius: 25px; border: 5px solid var(--danger);
        }

        .btn-accept {
            background: var(--dark); color: white; padding: 10px 30px;
            border-radius: 10px; border: none; font-size: 1.2rem;
            margin-top: 20px; cursor: pointer;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 600; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .btn-play {
            background: var(--secondary); color: var(--dark);
            padding: 20px 50px; font-size: 2rem; border-radius: 50px;
            border: none; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color: var(--primary);">🌟 SUPER MISIÓN 🌟</h1>
    <p>Matemáticas • Inglés • Biblia</p>
    <button class="btn-play" onclick="init()">EMPEZAR</button>
</div>

<div class="hud">
    <div>XP: <span id="xp">0</span></div>
    <div class="lives" id="lives-display">❤️❤️❤️</div>
</div>

<div class="game-screen" id="game-screen">
    <div class="question-box" id="q-box">
        <div id="sub-q">Cargando...</div>
        <div id="main-q">?</div>
    </div>
    <div class="options-grid" id="options-area"></div>
</div>

<div class="modal" id="papa-modal">
    <div class="modal-content">
        <h2 style="color: var(--danger);">🚨 ¡CUIDADO! 🚨</h2>
        <p style="font-size: 1.3rem;"><b>Tu papá está viendo el puntaje y te va a poner una <span style="font-size: 2rem;">X</span> en la nevera.</b></p>
        <p>¡Concéntrate más!</p>
        <button class="btn-accept" onclick="closePapaModal()">LO SIENTO, ACEPTO</button>
    </div>
</div>

<script>
    let xp = 0;
    let lives = 3;
    let currentCorrect = null;
    let gameType = 'math'; // 'math', 'english', 'bible'
    
    const bibleQuestions = [
        { q: "¿Quién construyó el Arca?", a: "Noé", opts: ["Moisés", "Noé", "David", "Adán"] },
        { q: "¿Quién venció al gigante Goliat?", a: "David", opts: ["David", "Salomón", "Sansón", "Saúl"] },
        { q: "¿Cuántos días tardó Dios en crear el mundo?", a: "6", opts: ["7", "6", "10", "3"] },
        { q: "¿Quién fue el primer hombre?", a: "Adán", opts: ["Jesús", "Adán", "Abrahán", "Pedro"] }
    ];

    const englishQuestions = [
        { q: "How do you say 'Hola'?", a: "Hello", opts: ["Bye", "Hello", "Thanks", "Dog"] },
        { q: "What color is the sky?", a: "Blue", opts: ["Red", "Green", "Blue", "Yellow"] },
        { q: "How do you say 'Manzana'?", a: "Apple", opts: ["Pear", "Grape", "Apple", "Orange"] },
        { q: "What is 'Dog'?", a: "Perro", opts: ["Gato", "Perro", "Pájaro", "Pez"] }
    ];

    function init() {
        document.getElementById('start-screen').style.display = 'none';
        nextRound();
    }

    function nextRound() {
        // Limpiar área
        document.getElementById('options-area').innerHTML = '';
        const bubbles = document.querySelectorAll('.bubble');
        bubbles.forEach(b => b.remove());

        // Elegir tipo de juego aleatorio
        const rand = Math.random();
        if (rand < 0.5) gameType = 'math';
        else if (rand < 0.75) gameType = 'english';
        else gameType = 'bible';

        if (gameType === 'math') {
            setupMath();
        } else {
            setupQuiz();
        }
    }

    function setupMath() {
        const n1 = Math.floor(Math.random() * 9) + 2;
        const n2 = Math.floor(Math.random() * 9) + 1;
        currentCorrect = n1 * n2;

        document.getElementById('sub-q').innerText = "TABLAS DE MULTIPLICAR";
        document.getElementById('main-q').innerText = `${n1} x ${n2}`;
        
        // Voz en inglés de la tabla
        const talk = new SpeechSynthesisUtterance(`${n1} times ${n2}`);
        talk.lang = 'en-US';
        window.speechSynthesis.speak(talk);

        spawnBubbles(currentCorrect);
    }

    function spawnBubbles(correct) {
        let options = [correct];
        while(options.length < 4) {
            let fake = (Math.floor(Math.random()*9)+2) * (Math.floor(Math.random()*9)+1);
            if(!options.includes(fake)) options.push(fake);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach((val, i) => {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerText = val;
            b.style.left = (15 + (i * 20)) + '%';
            
            let pos = 110;
            let speed = 0.2 + (Math.random() * 0.2); // BURBUJAS MÁS LENTAS

            function move() {
                pos -= speed;
                b.style.top = pos + '%';
                if(pos < -15) pos = 110;
                if(b.parentNode) requestAnimationFrame(move);
            }
            
            b.onclick = () => {
                if(val === correct) {
                    winPoint();
                } else {
                    failLife();
                }
            };
            document.body.appendChild(b);
            move();
        });
    }

    function setupQuiz() {
        const list = (gameType === 'english') ? englishQuestions : bibleQuestions;
        const item = list[Math.floor(Math.random() * list.length)];
        
        document.getElementById('sub-q').innerText = gameType.toUpperCase();
        document.getElementById('main-q').innerText = item.q;
        currentCorrect = item.a;

        item.opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt === currentCorrect) winPoint();
                else failLife();
            };
            document.getElementById('options-area').appendChild(btn);
        });
    }

    function winPoint() {
        xp += 10;
        document.getElementById('xp').innerText = xp;
        document.getElementById('q-box').style.borderColor = 'var(--secondary)';
        setTimeout(nextRound, 600);
    }

    function failLife() {
        lives--;
        updateLives();
        document.getElementById('papa-modal').style.display = 'flex';
    }

    function updateLives() {
        const display = "❤️".repeat(lives) + "🖤".repeat(3 - lives);
        document.getElementById('lives-display').innerText = display;
        if(lives <= 0) {
            alert("¡GAME OVER! Vamos a estudiar un poco más con papá.");
            location.reload();
        }
    }

    function closePapaModal() {
        document.getElementById('papa-modal').style.display = 'none';
        nextRound();
    }

    function updateLives() {
        const display = "❤️".repeat(Math.max(0, lives)) + "🖤".repeat(Math.max(0, 3 - lives));
        document.getElementById('lives-display').innerText = display;
    }

</script>
</body>
</html>
