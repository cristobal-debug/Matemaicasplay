<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión Sabiduría: Biblia & English</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --danger: #d63031;
            --bible-gold: #f1c40f;
            --dark: #2d3436;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Fredoka', sans-serif;
            background: radial-gradient(circle, #2d3436 0%, #000000 100%);
            color: white; overflow: hidden;
        }

        /* HUD */
        .hud {
            position: absolute; top: 0; width: 100%; display: flex;
            justify-content: space-between; padding: 20px; box-sizing: border-box;
            background: rgba(0,0,0,0.5); z-index: 100;
        }

        .lives { color: var(--danger); font-size: 1.5rem; text-shadow: 0 0 10px rgba(214, 48, 49, 0.5); }

        /* Contenedores */
        .game-screen {
            height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }

        .story-card {
            background: rgba(255, 255, 255, 0.98);
            color: #2d3436; padding: 30px; border-radius: 25px;
            max-width: 550px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center; display: none; border: 5px solid var(--secondary);
        }

        .math-display { font-size: 6rem; text-shadow: 0 0 30px var(--primary); display: none; }

        /* Burbujas */
        .bubble {
            position: absolute; width: 95px; height: 95px;
            background: radial-gradient(circle at 30% 30%, #ffffff, var(--secondary));
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 2.2rem; color: var(--dark);
            font-weight: bold; cursor: pointer; z-index: 50;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Opciones */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;
        }

        .opt-btn {
            background: var(--dark); color: white; border: none;
            padding: 15px; border-radius: 15px; font-size: 1.1rem;
            cursor: pointer; transition: 0.2s;
        }

        .opt-btn:hover { background: var(--primary); }

        /* Alerta Papá */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }

        .modal-box {
            background: white; color: var(--dark); padding: 40px;
            border-radius: 30px; border: 10px solid var(--danger); width: 80%;
        }

        #start-btn {
            padding: 20px 60px; font-size: 2.5rem; border-radius: 50px;
            background: var(--secondary); border: none; color: white; cursor: pointer;
            box-shadow: 0 0 30px var(--secondary);
        }
    </style>
</head>
<body>

<div id="start-screen" style="position:fixed; inset:0; background:var(--dark); z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="color:var(--secondary); font-size:3rem;">🌟 MISIÓN INTELIGENTE 🌟</h1>
    <button id="start-btn" onclick="start()">INICIAR</button>
</div>

<div class="hud">
    <div style="font-size: 1.5rem;">XP: <span id="xp">0</span></div>
    <div class="lives" id="hp">❤️❤️❤️</div>
</div>

<div class="game-screen">
    <div id="math-val" class="math-display"></div>

    <div id="story-val" class="story-card">
        <h2 id="story-cat" style="margin-top:0; color:var(--primary);"></h2>
        <div id="story-content" style="font-size: 1.1rem; line-height: 1.5; margin-bottom: 15px; text-align: left; padding: 10px; border-left: 5px solid var(--secondary); background: #f9f9f9;"></div>
        <p id="story-q" style="font-weight: bold; font-size: 1.2rem;"></p>
        <div class="options-grid" id="options"></div>
    </div>
</div>

<div class="modal" id="papa-modal">
    <div class="modal-box">
        <h1 style="color: var(--danger);">🛑 ¡ALTO AHÍ!</h1>
        <p style="font-size: 1.5rem;"><b>Tu papá está viendo tu progreso.</b><br>Por este error, te pondrá una <span style="font-size: 2.5rem;">X</span> en la nevera.</p>
        <button onclick="closeModal()" style="background:var(--dark); color:white; padding:15px 40px; border-radius:10px; border:none; font-size:1.2rem; cursor:pointer;">ACEPTO Y MEJORARÉ</button>
    </div>
</div>

<script>
    let xp = 0;
    let lives = 3;
    let correct = "";

    // --- BASE DE DATOS DE HISTORIAS BÍBLICAS ---
    const bibleDB = [
        {
            story: "David era un joven pastor que confiaba en Dios. Cuando el gigante Goliat amenazó a su pueblo, David no usó espada, sino una honda y cinco piedras lisas del arroyo. Con un solo tiro, derribó al gigante.",
            q: "¿Qué usó David para vencer a Goliat en lugar de una espada?",
            a: "Una honda y piedras",
            opts: ["Un arco y flecha", "Una honda y piedras", "Una lanza mágica", "Un escudo grande"]
        },
        {
            story: "Daniel amaba a Dios y oraba tres veces al día. Por su fe, fue lanzado a un foso lleno de leones hambrientos. Pero Dios envió un ángel que cerró la boca de los leones y Daniel salió sin un rasguño.",
            q: "¿Qué hizo Dios para salvar a Daniel en el foso?",
            a: "Envió un ángel",
            opts: ["Envió un ángel", "Hizo dormir a Daniel", "Le dio una espada", "Abrió una puerta secreta"]
        },
        {
            story: "La reina Ester fue muy valiente. Ella arriesgó su vida hablando con el Rey para salvar a su pueblo de un plan malvado. Antes de hacerlo, pidió a todos que ayunaran y oraran durante tres días.",
            q: "¿Por cuánto tiempo pidió Ester que ayunaran antes de ir ante el rey?",
            a: "3 días",
            opts: ["1 día", "3 días", "1 semana", "40 días"]
        }
    ];

    // --- BASE DE DATOS DE INGLÉS (NIVEL MÁS DIFÍCIL) ---
    const englishDB = [
        {
            story: "English Challenge: Grammar & Verbs",
            q: "Which sentence is correct? (¿Cuál es correcta?)",
            a: "She plays the piano",
            opts: ["She play the piano", "She plays the piano", "She playing piano", "She are play piano"]
        },
        {
            story: "English Challenge: Daily Life",
            q: "How do you ask for water politely? (¿Cómo pides agua educadamente?)",
            a: "Can I have some water, please?",
            opts: ["Give me water", "I want water now", "Can I have some water, please?", "Water is good"]
        },
        {
            story: "English Challenge: Opposite Words",
            q: "What is the opposite of 'Strong'? (¿Qué es lo opuesto a Fuerte?)",
            a: "Weak",
            opts: ["Big", "Fast", "Weak", "Small"]
        }
    ];

    const engNums = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten", "eleven", "twelve"];

    function start() {
        document.getElementById('start-screen').style.display = 'none';
        nextRound();
    }

    function nextRound() {
        document.getElementById('math-val').style.display = 'none';
        document.getElementById('story-val').style.display = 'none';
        document.getElementById('options').innerHTML = '';
        const bubbles = document.querySelectorAll('.bubble');
        bubbles.forEach(b => b.remove());

        let r = Math.random();
        if(r < 0.4) setupMath();
        else if(r < 0.7) setupStory(bibleDB, "📖 HISTORIA BÍBLICA");
        else setupStory(englishDB, "🇬🇧 ADVANCED ENGLISH");
    }

    function setupMath() {
        const mv = document.getElementById('math-val');
        mv.style.display = 'block';
        let n1 = Math.floor(Math.random() * 8) + 2;
        let n2 = Math.floor(Math.random() * 9) + 1;
        correct = n1 * n2;
        mv.innerText = `${n1} x ${n2}`;
        
        let t = new SpeechSynthesisUtterance(`${engNums[n1]} times ${engNums[n2]}`);
        t.lang = 'en-US'; window.speechSynthesis.speak(t);

        let opts = [correct];
        while(opts.length < 4) {
            let f = (Math.floor(Math.random()*9)+2) * (Math.floor(Math.random()*9)+1);
            if(!opts.includes(f)) opts.push(f);
        }
        opts.sort(() => Math.random() - 0.5);

        opts.forEach((v, i) => {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.innerText = v;
            b.style.left = (15 + (i * 20)) + '%';
            let pos = 110;
            let speed = 0.12 + (Math.random() * 0.1); // ULTRA LENTAS
            function move() {
                pos -= speed;
                b.style.top = pos + '%';
                if(pos < -15) pos = 110;
                if(b.parentNode) requestAnimationFrame(move);
            }
            b.onclick = () => (v === correct) ? win() : fail();
            document.body.appendChild(b);
            move();
        });
    }

    function setupStory(db, title) {
        const zone = document.getElementById('story-val');
        zone.style.display = 'block';
        const item = db[Math.floor(Math.random() * db.length)];
        
        document.getElementById('story-cat').innerText = title;
        document.getElementById('story-content').innerText = item.story;
        document.getElementById('story-q').innerText = item.q;
        correct = item.a;

        item.opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = o;
            btn.onclick = () => (o === correct) ? win() : fail();
            document.getElementById('options').appendChild(btn);
        });
        if(title.includes("ENGLISH")) {
            let t = new SpeechSynthesisUtterance(item.q);
            t.lang = 'en-US'; window.speechSynthesis.speak(t);
        }
    }

    function win() {
        xp += 10;
        document.getElementById('xp').innerText = xp;
        nextRound();
    }

    function fail() {
        lives--;
        document.getElementById('hp').innerText = "❤️".repeat(Math.max(0, lives)) + "🖤".repeat(Math.max(0, 3 - lives));
        document.getElementById('papa-modal').style.display = 'flex';
        if(lives <= 0) {
            alert("Has agotado tus vidas. ¡Es hora de repasar con papá!");
            location.reload();
        }
    }

    function closeModal() {
        document.getElementById('papa-modal').style.display = 'none';
        nextRound();
    }
</script>
</body>
</html>
